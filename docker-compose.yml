services:
  # --- Caddy reverse proxy + static file server ---
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy-net

      # --- One-shot setup: downloads + extracts + installs NeoForge ---
  minecraft-setup:
    image: eclipse-temurin:21
    container_name: minecraft-setup
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/server.properties:/tmp/server.properties:ro
    entrypoint: ["/bin/bash", "-c"]
    command: |
      if [ -f /data/run.sh ]; then
        echo "[setup] Server already installed, skipping."
        exit 0
      fi
      echo "[setup] Downloading server pack..."
      apt-get update -qq && apt-get install -y -qq wget unzip
      wget -q -O /tmp/pack.zip "https://mediafilez.forgecdn.net/files/7978/707/ATFG11%20v11.2.1hf%20Server%20Files.zip"
      mkdir -p /tmp/pack
      unzip -q -o /tmp/pack.zip -d /tmp/pack
      # Find the folder containing the NeoForge installer
      EXTRACTED_DIR=$$(find /tmp/pack -name "neoforge-*-installer.jar" -exec dirname {} \; | head -1)
      if [ -n "$$EXTRACTED_DIR" ]; then
        shopt -s dotglob
        mv "$$EXTRACTED_DIR"/* /data/
        shopt -u dotglob
      else
        echo "[setup] ERROR: Could not find NeoForge installer"
        exit 1
      fi
      cd /data
      echo "[setup] Running NeoForge installer..."
      java -jar neoforge-*-installer.jar --installServer
      # Apply our tracked server.properties
      cp /tmp/server.properties /data/server.properties
      chown -R 1000:1000 /data
      rm -rf /tmp/pack /tmp/pack.zip
      echo "[setup] Done!"

  # --- Minecraft server ---
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ./minecraft/data:/data
    networks:
      - proxy-net
    depends_on:
      minecraft-setup:
        condition: service_completed_successfully
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/run.sh"
      MEMORY: "16G"
      # server.properties is managed manually — edit ./minecraft/data/server.properties
      USE_AIKAR_FLAGS: "TRUE"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
    tty: true
    stdin_open: true

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy-net:
    driver: bridge
