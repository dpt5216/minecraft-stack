services:
  # --- Caddy reverse proxy + static file server ---
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy-net

        # --- One-shot setup: downloads + extracts + installs NeoForge ---
  minecraft-setup:
    image: eclipse-temurin:21
    container_name: minecraft-setup
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/server.properties:/tmp/server.properties:ro
      - ./minecraft/setup.sh:/tmp/setup.sh:ro
    entrypoint: ["/bin/bash", "/tmp/setup.sh"]

  # --- Minecraft server ---
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ./minecraft/data:/data
    networks:
      - proxy-net
    depends_on:
      minecraft-setup:
        condition: service_completed_successfully
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/run.sh"
      MEMORY: "16G"
      # server.properties is managed manually — edit ./minecraft/data/server.properties
      USE_AIKAR_FLAGS: "TRUE"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
    tty: true
    stdin_open: true

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy-net:
    driver: bridge
