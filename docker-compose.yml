services:
  # --- Caddy reverse proxy + static file server ---
  caddy:                                                                         # Pinned 2026-06-24; update intentionally
    image: caddy:2.11
    container_name: caddy
    restart: unless-stopped
    environment:
      DISCORD_INVITE: ${DISCORD_INVITE}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config

  # --- One-shot setup: downloads + extracts + installs NeoForge ---
  minecraft-setup:
    image: eclipse-temurin:21
    container_name: minecraft-setup
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/server.properties:/tmp/server.properties:ro
      - ./minecraft/server-icon.png:/tmp/server-icon.png:ro
      - ./minecraft/extra-mods.txt:/tmp/extra-mods.txt:ro
      - ./minecraft/setup.sh:/tmp/setup.sh:ro
    entrypoint: ["/bin/bash", "/tmp/setup.sh"]

  # --- Minecraft server ---
  minecraft:
    # Pinned 2026-06-22; update intentionally
    image: itzg/minecraft-server:2026.6.1-java21
    container_name: minecraft-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ./minecraft/data:/data
    depends_on:
      minecraft-setup:
        condition: service_completed_successfully
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/run.sh"
      MEMORY: "8G"
      USE_AIKAR_FLAGS: "TRUE"
      # Spark profile (EfGVMYAccp) showed G1 young-gen pauses averaging 232ms,
      # overshooting Aikar's 200ms target. Heap only uses ~5GB of 12GB committed.
      #  - shrink heap to 8G: less to scan per GC
      #  - tighten pause target to 50ms: more frequent, shorter young GCs
      # G1HeapRegionSize=8M + ParallelRefProcEnabled already come from Aikar flags;
      # JVM_XX_OPTS appends after them, so this safely overrides MaxGCPauseMillis.
      JVM_XX_OPTS: "-XX:MaxGCPauseMillis=50"
      RCON_PASSWORD: ${RCON_PASSWORD}
    tty: true
    stdin_open: true
    # Host has 12GB total. Leave ~3GB for OS + Caddy + setup container overhead.
    mem_limit: 9g
    mem_reservation: 8g

volumes:
  caddy_data:
  caddy_config:
