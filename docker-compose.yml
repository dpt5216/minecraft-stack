services:
  # --- Caddy reverse proxy + static file server ---
  caddy:
    # Pinned 2026-06-24; update intentionally
    image: caddy:2.11
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config

  # --- One-shot setup: downloads + extracts + installs NeoForge ---
  minecraft-setup:
    image: eclipse-temurin:21
    container_name: minecraft-setup
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/server.properties:/tmp/server.properties:ro
      - ./minecraft/server-icon.png:/tmp/server-icon.png:ro
      - ./minecraft/extra-mods.txt:/tmp/extra-mods.txt:ro
      - ./minecraft/setup.sh:/tmp/setup.sh:ro
    entrypoint: ["/bin/bash", "/tmp/setup.sh"]

  # --- Minecraft server ---
  minecraft:
    # Pinned 2026-06-22; update intentionally
    image: itzg/minecraft-server:2026.6.1-java21
    container_name: minecraft-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ./minecraft/data:/data
    depends_on:
      minecraft-setup:
        condition: service_completed_successfully
    environment:
      EULA: "TRUE"
      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/run.sh"
      MEMORY: "16G"
      # server.properties is managed manually — edit ./minecraft/data/server.properties
      USE_AIKAR_FLAGS: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD}
    tty: true
    stdin_open: true
    mem_limit: 20g
    mem_reservation: 16g

volumes:
  caddy_data:
  caddy_config:
